<div class="login-box">

  <h2>Login</h2>

  <form
    [formGroup]="loginForm"
    (ngSubmit)="entrar()">

    <div>

      <label>E-mail</label>

      <input
        type="email"
        formControlName="email">

    </div>

    <br>

    <div>

      <label>Senha</label>

      <input
        type="password"
        formControlName="senha">

    </div>

    <br>

    <button type="submit">

      Entrar

    </button>

  </form>

</div>
