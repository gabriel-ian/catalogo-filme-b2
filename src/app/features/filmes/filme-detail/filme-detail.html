@if(filme){

<h2>{{ filme.nome }}</h2>

<img
  [src]="filme.imagem"
  width="300">

<hr>

<p>

<strong>Gênero:</strong>

{{ filme.genero }}

</p>

<p>

<strong>Duração:</strong>

{{ filme.duracao }} minutos

</p>

<p>

<strong>Classificação:</strong>

{{ filme.classificacao | classificacao }}

</p>

<p>

<strong>Sinopse:</strong>

{{ filme.sinopse }}

</p>

}
