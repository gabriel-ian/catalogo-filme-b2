@if(filmeId){

<h2>Editar Filme</h2>

} @else {

<h2>Cadastrar Filme</h2>

}

<form [formGroup]="filmeForm"
      (ngSubmit)="salvar()">

  <div>

    <label>Nome</label>

    <input
      type="text"
      formControlName="nome">

  </div>

  <br>

  <div>

    <label>Gênero</label>

    <input
      type="text"
      formControlName="genero">

  </div>

  <br>

  <div>

    <label>Duração (min)</label>

    <input
      type="number"
      formControlName="duracao">

  </div>

  <br>

  <div>

    <label>Classificação</label>

    <select formControlName="classificacao">

      <option value="">
        Selecione
      </option>

      <option value="L">
        Livre
      </option>

      <option value="10">
        10 anos
      </option>

      <option value="12">
        12 anos
      </option>

      <option value="14">
        14 anos
      </option>

      <option value="16">
        16 anos
      </option>

      <option value="18">
        18 anos
      </option>

    </select>

  </div>

  <br>

  <div>

    <label>Sinopse</label>

    <textarea
      rows="5"
      formControlName="sinopse">
    </textarea>

  </div>

  <br>

  <div>

    <label>URL da Imagem</label>

    <input
      type="text"
      formControlName="imagem">

  </div>

  <br>

  <button type="submit">
    Salvar
  </button>

</form>
