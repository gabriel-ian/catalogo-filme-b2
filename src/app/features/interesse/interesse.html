<h2>Lista de Interesse</h2>

@if(filmes.length === 0){

<p class="empty-state">
  Nenhum filme adicionado à lista de interesse.
</p>

} @else {

<div class="catalogo">

  @for(filme of filmes; track filme.id){

  <div class="card">

    <img
      [src]="filme.imagem"
      [alt]="filme.nome">

    <h3>{{ filme.nome }}</h3>

    <p>
      <strong>Gênero:</strong>
      {{ filme.genero }}
    </p>

    <p>
      <strong>Duração:</strong>
      {{ filme.duracao }} min
    </p>

    <p>
      <strong>Classificação:</strong>
      {{ filme.classificacao | classificacao }}
    </p>

    <div class="acoes">

      <a [routerLink]="['/filmes', filme.id]">
        Detalhes
      </a>

      <button
        type="button"
        (click)="remover(filme.id!)">
        Remover
      </button>

    </div>

  </div>

  }

</div>

}
